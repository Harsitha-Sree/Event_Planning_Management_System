 
<aside class="main-sidebar" id="sidebar-menu-container">
    <nav class="sidebar-nav">
        <ul id="sidebar-menu">
            <!-- Sidebar links will be dynamically loaded here by JavaScript -->
            <li class="loading-sidebar"><i class="fas fa-spinner fa-spin"></i> Loading menu...</li>
        </ul>
    </nav>
</aside>

<script>
    // This script block is specific to the sidebar partial to dynamically generate menu items.
    // It runs only when the sidebar partial is loaded into the DOM.
    document.addEventListener('DOMContentLoaded', () => {
        const sidebarMenu = document.getElementById('sidebar-menu');
        const token = localStorage.getItem('token');
        let userRole = null;

        if (token) {
            const decodedToken = decodeJwt(token); // `decodeJwt` is from main.js
            if (decodedToken) {
                userRole = decodedToken.role;
            } else {
                console.error("Invalid token found in localStorage for sidebar. Cannot determine role.");
            }
        }

        sidebarMenu.innerHTML = ''; // Clear loading message

        if (userRole) {
            let menuItems = [];

            if (userRole === 'admin') {
                menuItems = [
                    { name: 'Dashboard', href: '/admin/dashboard.html', icon: 'fas fa-chart-line' },
                    { name: 'Organizers', href: '/admin/organizers.html', icon: 'fas fa-users' },
                    { name: 'Vendors', href: '/admin/vendors.html', icon: 'fas fa-store' },
                    { name: 'Events', href: '/admin/events.html', icon: 'fas fa-calendar-alt' }
                ];
            } else if (userRole === 'organizer') {
                menuItems = [
                    { name: 'Dashboard', href: '/organizer/dashboard.html', icon: 'fas fa-tachometer-alt' },
                    { name: 'My Events', href: '/organizer/events.html', icon: 'fas fa-calendar-plus' },
                    { name: 'Find Vendors', href: '/organizer/vendors.html', icon: 'fas fa-search' },
                    { name: 'Messages', href: '/organizer/messages.html', icon: 'fas fa-comments' }
                ];
            } else if (userRole === 'vendor') {
                menuItems = [
                    { name: 'Dashboard', href: '/vendor/dashboard.html', icon: 'fas fa-store' },
                    { name: 'My Profile', href: '/vendor/profile.html', icon: 'fas fa-id-card' },
                    { name: 'Messages', href: '/vendor/messages.html', icon: 'fas fa-comments' }
                ];
            }

            menuItems.forEach(item => {
                const listItem = document.createElement('li');
                const link = document.createElement('a');
                link.href = item.href;
                link.innerHTML = `<i class="${item.icon}"></i> <span>${item.name}</span>`;

                // Logic to set active class is in main.js's loadPartial for consistency
                // The main.js `loadPartial` already handles checking current path and setting 'active' class.

                listItem.appendChild(link);
                sidebarMenu.appendChild(listItem);
            });
        } else {
            sidebarMenu.innerHTML = '<li class="error-sidebar">Cannot load menu. Please login.</li>';
        }
    });
</script>

<style>

</style>
